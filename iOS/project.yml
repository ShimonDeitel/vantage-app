name: Vantage
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Vantage:
    type: application
    platform: iOS
    sources:
      - path: Vantage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vantage
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Vantage/Info.plist
        CODE_SIGN_ENTITLEMENTS: Vantage/Vantage.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  VantageTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: VantageTests
      - path: Vantage.storekit
    dependencies:
      - target: Vantage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.vantage.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Vantage:
    build:
      targets:
        Vantage: all
        VantageTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Vantage.storekit
    test:
      config: Debug
      storeKitConfiguration: Vantage.storekit
      targets:
        - VantageTests
    archive:
      config: Release
