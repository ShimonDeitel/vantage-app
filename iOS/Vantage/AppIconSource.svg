<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <rect width="1024" height="1024" fill="#F3F0E7"/>

  <!-- faint proportion-grid thirds -->
  <g stroke="#3A3B3D" stroke-opacity="0.32" stroke-width="6">
    <line x1="341" y1="150" x2="341" y2="874"/>
    <line x1="683" y1="150" x2="683" y2="874"/>
    <line x1="150" y1="341" x2="874" y2="341"/>
    <line x1="150" y1="683" x2="874" y2="683"/>
  </g>

  <!-- viewfinder corner brackets -->
  <g stroke="#2B2C2E" stroke-width="26" fill="none" stroke-linecap="square">
    <path d="M 140 300 L 140 140 L 300 140"/>
    <path d="M 724 140 L 884 140 L 884 300"/>
    <path d="M 884 724 L 884 884 L 724 884"/>
    <path d="M 300 884 L 140 884 L 140 724"/>
  </g>

  <!-- plumb line -->
  <line x1="512" y1="205" x2="512" y2="800" stroke="#2B2C2E" stroke-width="20" stroke-linecap="square"/>
  <!-- level crosshair -->
  <line x1="357" y1="512" x2="667" y2="512" stroke="#2B2C2E" stroke-width="16" stroke-linecap="square"/>

  <!-- plumb bob (angular, no rounded corners) -->
  <rect x="483" y="771" width="58" height="58" transform="rotate(45 512 800)" fill="#2B2C2E"/>

  <!-- red-pencil correction accent — a proofreader's caret, the single vivid accent -->
  <path d="M 582 468 L 622 404 L 662 468" stroke="#E8362B" stroke-width="17" fill="none"
        stroke-linecap="square" stroke-linejoin="miter"/>
</svg>
